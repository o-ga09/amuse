version: 2
before:
  hooks:
    - go mod download
    - go mod tidy
builds:
  -
    id: amuse-darwin
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/o-ga09/amuse/version.Revision={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  -
    id: amuse-archive
    name_template: '{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
checksum:
  name_template: 'checksums.txt'
brews:
  -
    name: amuse
    repository:
      owner: o-ga09
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/o-ga09/amuse"
    description: "amuse controls Apple Music (Music.app) from the terminal on macOS, via AppleScript."
    license: "MIT"
    install: |
      bin.install "amuse"
    test: |
      system "#{bin}/amuse --version"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
release:
  use_existing_draft: true
